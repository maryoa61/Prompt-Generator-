name: Build Release APK

# When this workflow runs:
# 1. Manually, any time, from the "Actions" tab in GitHub (workflow_dispatch)
#    -> creates a "build-<run number>" pre-release
# 2. Automatically on every push to "main" or "master"
#    -> creates a "build-<run number>" pre-release
# 3. Automatically whenever you push a tag like "v1.0.0", "v2.3.1", etc.
#    -> creates a full (non-prerelease) GitHub Release using that tag
# In every case, the APK is built, uploaded as a workflow artifact, AND
# attached to a GitHub Release.
on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"

# Avoid two release builds running at the same time for the same ref
concurrency:
  group: release-apk-${{ github.ref }}
  cancel-in-progress: true

# Needed so the built-in GITHUB_TOKEN can create/update GitHub Releases
permissions:
  contents: write

jobs:
  build:
    name: Build & sign release APK
    runs-on: ubuntu-latest

    # Job-level env, computed once, so it can be safely referenced in a
    # step's `if:` condition (secrets.* cannot be used directly in `if:`).
    env:
      HAS_KEYSTORE: ${{ secrets.DEBUG_KEYSTORE_BASE64 != '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # If your repo secrets DEBUG_KEYSTORE_BASE64 / KEYSTORE_PASSWORD /
      # KEY_ALIAS / KEY_PASSWORD are NOT set, this step is skipped and the
      # build below simply produces an UNSIGNED release APK instead of
      # failing.
      - name: Decode signing keystore (if configured)
        id: keystore
        if: ${{ env.HAS_KEYSTORE == 'true' }}
        run: |
          KEYSTORE_PATH="${RUNNER_TEMP}/release.jks"
          echo "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" | base64 -d > "$KEYSTORE_PATH"
          echo "keystore_path=$KEYSTORE_PATH" >> "$GITHUB_OUTPUT"

      - name: Build release APK
        env:
          KEYSTORE_PATH: ${{ steps.keystore.outputs.keystore_path }}
          STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Locate built APK
        id: apk
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          echo "path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "Built APK: $APK_PATH"

      - name: Upload APK as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error

      - name: Determine release tag
        id: release_tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag_name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "tag_name=build-${{ github.run_number }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      # Runs on every trigger: real version tags (e.g. "v1.0.0") produce a
      # normal GitHub Release; plain pushes to main/master produce an
      # auto-tagged "build-<run number>" pre-release instead.
      - name: Attach APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag_name }}
          prerelease: ${{ steps.release_tag.outputs.prerelease }}
          files: ${{ steps.apk.outputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
